s3_prefix = "docflow-aws"
region = "ap-south-1"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
parameter_overrides = "AllowPublicDbAccess=true"

[default.build.parameters]
cached = true
parallel = true
